<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Akční Sestavy – Drozda Nářadí</title>
<meta name="description" content="Výhodné sady nářadí Milwaukee za akční ceny. Drozda Nářadí."/>
<script>if(localStorage.getItem('theme')!=='dark')document.documentElement.classList.add('light');</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root{
  --red:#DB011C;
  --sale-color:#FFD60A;
  --bg:#0a0a0a;
  --container-bg:#1e1e1e;
  --card-bg:#1f1f1f;
  --border:#3a3a3a;
  --border-soft:#2a2a2a;
  --card-border:#3d3d3d;
  --text:#f5f5f5;
  --text-2:#bdbdbd;
  --text-3:#9a9a9a;
  --text-4:#888;
  --text-5:#7a7a7a;
  --text-6:#666;
}
.light{
  --sale-color:#D4900A;
  --bg:#f8f8f8;
  --container-bg:#eeeeee;
  --card-bg:#ffffff;
  --border:#c0c0c0;
  --border-soft:#d8d8d8;
  --card-border:#c8c8c8;
  --text:#111111;
  --text-2:#333333;
  --text-3:#555555;
  --text-4:#777777;
  --text-5:#999999;
  --text-6:#bbbbbb;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--text);font-family:'Inter Tight','Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh}

/* TOPBAR */
.topbar{border-bottom:1px solid var(--border-soft);font-size:14px}
.topbar-inner{max-width:1280px;margin:0 auto;padding:32px 80px;display:flex;align-items:center;justify-content:space-between}
.brand{display:flex;gap:10px;align-items:baseline;color:var(--text)}
.brand strong{font-weight:700;letter-spacing:-.01em}
.brand span{color:var(--text-6)}
.topbar-right{display:flex;align-items:center;gap:16px}
.topbar-tag{color:var(--text-4);font-weight:500}
.theme-btn{background:var(--container-bg);border:1px solid var(--border);color:var(--text-3);font-size:12px;font-weight:600;padding:6px 12px;border-radius:7px;cursor:pointer;font-family:inherit;letter-spacing:.02em;transition:border-color .15s}
.theme-btn:hover{border-color:var(--text-4)}

/* HERO */
.hero{max-width:1280px;margin:0 auto;padding:36px 60px 28px}
.eyebrow{color:var(--red);font-size:15px;font-weight:600;letter-spacing:.01em;margin-bottom:10px}
.hero h1{font-size:58px;line-height:.95;font-weight:700;letter-spacing:-.04em;margin:0 0 12px;color:var(--text)}
.hero p{font-size:15px;color:var(--text-3);max-width:560px;line-height:1.45;margin:0}

/* SETS */
.sets{max-width:1280px;margin:0 auto;padding:12px 60px 48px;display:flex;flex-direction:column;gap:32px}

/* SET */
.set{background:var(--container-bg);border:1px solid var(--border);border-radius:16px;padding:22px;display:flex;flex-direction:column;gap:16px}
.set-header{display:flex;justify-content:space-between;align-items:center;padding-bottom:16px;border-bottom:1px solid var(--border);gap:20px;flex-wrap:wrap}
.set-icon{width:64px;height:64px;object-fit:contain;flex-shrink:0}
.set-name{font-size:30px;font-weight:700;letter-spacing:-.03em;margin:0;line-height:1;color:var(--text)}
.set-header-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.save-block{text-align:right}
.save-label{color:var(--text-3);font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-bottom:3px}
.save-value{color:var(--text);font-size:18px;font-weight:700;letter-spacing:-.02em;line-height:1;font-variant-numeric:tabular-nums}
.save-pct{background:var(--red);color:#fff;font-size:16px;font-weight:800;padding:8px 12px;border-radius:7px;letter-spacing:-.01em;line-height:1;font-variant-numeric:tabular-nums}

/* PRODUCT GRID */
.grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px}
.card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:14px;overflow:hidden;display:flex;flex-direction:column}
.card-img{background:#fafafa;aspect-ratio:1/1;margin:12px;border-radius:10px;overflow:hidden;display:flex;align-items:center;justify-content:center;cursor:zoom-in;flex-shrink:0}
.card-img img{width:100%;height:100%;object-fit:contain;padding:6px}
.card-meta{display:flex;justify-content:space-between;align-items:center;padding:7px 14px;border-bottom:1px solid var(--card-border);gap:8px}
.sku{color:var(--text-4);font-size:11px;font-family:'JetBrains Mono',ui-monospace,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.detail-link{color:var(--red);font-size:12px;font-weight:600;text-decoration:none;white-space:nowrap;flex-shrink:0}
.detail-link:hover{text-decoration:underline}
.card-body{padding:10px 14px 14px;display:flex;flex-direction:column;gap:8px;flex:1}
.prod-name{font-size:14px;font-weight:500;line-height:1.35;color:var(--text-2);margin:0;flex:1}
.price-row{border-top:1px solid var(--card-border);padding-top:10px;margin-top:auto}
.price-main{font-size:20px;font-weight:700;color:var(--text)}
.price-vat{font-size:12px;color:var(--text-4);margin-top:2px}

/* SUMMARY */
.summary{padding-top:18px;border-top:1px solid var(--border);display:grid;grid-template-columns:1fr auto;gap:32px;align-items:start}
.sum-col{display:flex;flex-direction:column;min-width:0}
.sum-col.right{text-align:right;align-items:flex-end}
.sum-label{color:var(--text-2);font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;line-height:1.2;margin-bottom:3px}
.sum-sublabel{color:var(--text-5);font-size:11px;font-weight:700;letter-spacing:.02em;line-height:1.2;margin-bottom:8px}
.sum-value{font-size:40px;font-weight:700;letter-spacing:-.03em;line-height:1;font-variant-numeric:tabular-nums;margin:0;color:var(--text)}
.sum-value.list{color:var(--text-5);text-decoration:line-through;text-decoration-color:var(--red);text-decoration-thickness:2px}
.sum-value.sale{color:var(--sale-color)}
.light .sum-value.sale{color:#1a1a1a;background:#FFD60A;display:inline-block;padding:4px 12px;border-radius:8px;margin-bottom:2px}
.sum-vat{font-size:14px;color:var(--text-4);font-weight:500;letter-spacing:.02em;margin-top:6px;line-height:1.2}

/* PRICE CARD (4th grid item) */
.price-card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:14px;display:flex;flex-direction:column;overflow:hidden}
.price-card-top{padding:18px 18px 16px;flex:1;display:flex;flex-direction:column;border-bottom:1px solid var(--card-border);text-align:right}
.price-card-bot{padding:18px 18px 10px;flex:none;display:flex;flex-direction:column;text-align:right}
.price-card .sum-label{font-size:11px}
.price-card .sum-sublabel{font-size:11px;margin-bottom:6px}
.price-card .pc-prices{margin-top:auto}
.price-card .sum-value{font-size:26px;letter-spacing:-.02em}
.price-card .sum-value.sale{font-size:35px}
.light .price-card .sum-value.sale{padding:5px 14px;border-radius:9px}
.price-card .sum-vat{font-size:12px;margin-top:4px;margin-bottom:0}
.price-card-bot .sum-label{color:var(--red)}
@media(min-width:901px){.price-card{grid-column:4}}

/* PROMO LAYOUT (jeden artikl) */
.promo-layout{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.promo-left{background:var(--card-bg);border:1px solid var(--card-border);border-radius:14px;display:flex;align-items:center;justify-content:center;padding:32px;cursor:zoom-in;min-height:360px}
.promo-left img{max-width:100%;max-height:480px;object-fit:contain}
.promo-right{display:flex;flex-direction:column;gap:14px}
.promo-banner{border-radius:14px;overflow:hidden;background:var(--red);aspect-ratio:3/2;flex-shrink:0}
.promo-banner img{width:100%;height:100%;object-fit:cover;display:block}
.promo-info{background:var(--card-bg);border:1px solid var(--card-border);border-radius:14px;overflow:hidden;flex:1;display:flex;flex-direction:column}
.promo-info .card-meta{padding:12px 20px}
.promo-info .card-body{padding:16px 20px 24px;flex:1;display:flex;flex-direction:column;gap:14px}
.promo-info .prod-name{font-size:20px;font-weight:700;line-height:1.25;color:var(--text);flex:1}
.promo-info .price-main{font-size:32px}

/* FOOTER */
.page-footer{max-width:1280px;margin:0 auto;padding:40px 80px 80px;color:var(--text-6);font-size:12px;border-top:1px solid var(--border-soft)}

/* EMPTY / LOADING */
.empty{text-align:center;padding:80px 20px;color:var(--text-5)}
.empty h2{font-size:20px;font-weight:600;color:var(--text-3);margin-bottom:8px}
.loading{text-align:center;padding:80px 20px;color:var(--text-5);font-size:15px}

/* LIGHTBOX */
#lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:9999;align-items:center;justify-content:center;cursor:zoom-out}
#lightbox.open{display:flex}
#lightbox img{max-width:90vw;max-height:90vh;object-fit:contain;border-radius:12px;background:#fff;cursor:default}
#lb-close{position:fixed;top:20px;right:24px;color:#fff;font-size:26px;line-height:1;background:none;border:none;cursor:pointer;opacity:.6;font-family:inherit;padding:4px 8px}
#lb-close:hover{opacity:1}

/* DETAIL MODAL */
#detail-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:9998;align-items:flex-start;justify-content:center;overflow-y:auto;padding:40px 20px}
#detail-modal.open{display:flex}
.detail-card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:20px;width:100%;max-width:760px;overflow:hidden;margin:auto;position:relative}
.detail-close{position:absolute;top:16px;right:16px;background:var(--container-bg);border:1px solid var(--border);color:var(--text-3);font-size:18px;line-height:1;border-radius:8px;cursor:pointer;padding:6px 10px;font-family:inherit;z-index:1}
.detail-close:hover{color:var(--text)}
.detail-img-wrap{background:#fafafa;display:flex;align-items:center;justify-content:center;padding:32px;min-height:280px}
.detail-img-wrap img{max-width:100%;max-height:420px;object-fit:contain}
.detail-body{padding:28px 32px 36px}
.detail-name{font-size:22px;font-weight:700;letter-spacing:-.02em;margin-bottom:20px;line-height:1.2;color:var(--text)}
.detail-popis{font-size:14px;line-height:1.6;color:var(--text-3)}
.detail-popis p{margin-bottom:10px}
.detail-popis ul,.detail-popis ol{padding-left:20px;margin-bottom:10px}
.detail-popis li{margin-bottom:4px}
.detail-loading{text-align:center;padding:40px;color:var(--text-4);font-size:14px}

/* RESPONSIVE */
@media(max-width:900px){
  .topbar-inner{padding:20px 24px}
  .hero{padding:36px 24px 24px}
  .hero h1{font-size:48px}
  .sets{padding:12px 16px 48px;gap:24px}
  .set{padding:20px;border-radius:16px}
  .set-name{font-size:28px}
  .set-header{flex-direction:column;align-items:flex-start}
  .set-header-right{width:100%;justify-content:space-between}
  .grid{grid-template-columns:repeat(2,minmax(0,1fr))}
  .promo-layout{grid-template-columns:1fr}
  .promo-left{min-height:220px}
  .summary{grid-template-columns:1fr;gap:16px}
  .sum-col.right{text-align:left;align-items:flex-start}
  .sum-value{font-size:32px}
  .sum-value.list{font-size:22px}
  .page-footer{padding:24px}
}
@media(max-width:540px){
  .grid{grid-template-columns:repeat(2,minmax(0,1fr))}
  .hero h1{font-size:40px}
  .set-name{font-size:24px}
  .sum-value{font-size:34px}
  .sum-value.list{font-size:20px}
  .topbar-inner{flex-wrap:wrap;gap:10px}
}
</style>
</head>
<body>

<!-- LIGHTBOX -->
<div id="lightbox" onclick="closeLightbox()">
  <button id="lb-close" onclick="closeLightbox()">✕</button>
  <img id="lb-img" src="" alt="" onclick="event.stopPropagation()">
</div>

<!-- DETAIL MODAL -->
<div id="detail-modal" onclick="closeDetail(event)">
  <div class="detail-card" onclick="event.stopPropagation()">
    <button class="detail-close" onclick="closeDetail()">✕</button>
    <div class="detail-img-wrap"><img id="detail-img" src="" alt=""></div>
    <div class="detail-body">
      <div class="detail-name" id="detail-name"></div>
      <div class="detail-popis" id="detail-popis"><div class="detail-loading">Načítám popis…</div></div>
    </div>
  </div>
</div>

<header class="topbar">
  <div class="topbar-inner">
    <div class="brand"><strong id="pg-brand">Drozda Nářadí</strong><span id="pg-presents">Presents</span></div>
    <div class="topbar-right">
      <div class="topbar-tag" id="pg-tag">Akční sestavy</div>
      <button class="theme-btn" id="theme-btn" onclick="toggleTheme()">Světlý režim</button>
    </div>
  </div>
</header>

<section class="hero">
  <div class="eyebrow" id="pg-eyebrow">Milwaukee Tool</div>
  <h1 id="pg-h1">Akční sestavy</h1>
  <p id="pg-subtitle">Výhodné sady nářadí za speciální ceny. Platí jen po omezenou dobu.</p>
</section>

<main class="sets" id="sestavy">
  <div class="loading">Načítání…</div>
</main>

<footer class="page-footer">© <span id="pg-footer-brand">Drozda Nářadí</span> · Akce platí jen po omezenou dobu.</footer>

<script>
// Theme — init button label after DOM ready
(function(){
  const btn = document.getElementById('theme-btn');
  if (btn) btn.textContent = document.documentElement.classList.contains('light') ? 'Tmavý režim' : 'Světlý režim';
})();

function toggleTheme() {
  const light = document.documentElement.classList.toggle('light');
  localStorage.setItem('theme', light ? 'light' : 'dark');
  document.getElementById('theme-btn').textContent = light ? 'Tmavý režim' : 'Světlý režim';
}

// Lightbox
function openLightbox(el) {
  const src = el.dataset.src;
  const alt = el.dataset.alt;
  document.getElementById('lb-img').src = src;
  document.getElementById('lb-img').alt = alt || '';
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeLightbox(); closeDetail(); } });

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// Detail modal
async function openDetail(artikl, fotoUrl, nazev) {
  document.getElementById('detail-img').src = fotoUrl;
  document.getElementById('detail-img').alt = nazev;
  document.getElementById('detail-name').textContent = nazev;
  document.getElementById('detail-popis').innerHTML = '<div class="detail-loading">Načítám popis…</div>';
  document.getElementById('detail-modal').classList.add('open');
  document.body.style.overflow = 'hidden';
  try {
    const { data } = await sb.from('produkty_katalog')
      .select('popis').eq('kod_vyrobku', artikl).maybeSingle();
    document.getElementById('detail-popis').innerHTML = data?.popis || '<em>Popis není k dispozici.</em>';
  } catch {
    document.getElementById('detail-popis').innerHTML = '<em>Nepodařilo se načíst popis.</em>';
  }
}
function closeDetail() {
  document.getElementById('detail-modal').classList.remove('open');
  document.body.style.overflow = '';
}

const SB_URL = 'https://dsskekmjtdfasppwwmtd.supabase.co';
const SB_KEY = 'sb_publishable_FbEQYOP1kP0gS9dtWQJlZQ_ArFX9IpA';
const sb = supabase.createClient(SB_URL, SB_KEY);

function fmt(n){ return Number(n||0).toLocaleString('cs-CZ',{maximumFractionDigits:0}); }
function fmtKc(n){ return fmt(n) + ',- Kč'; }
function fmtKcDph(n){ return fmt(n) + ',- Kč s DPH'; }

async function loadSettings() {
  try {
    const { data } = await sb.from('page_settings').select('*').eq('id', 1).maybeSingle();
    if (!data) return;
    const set = (id, val) => { if (val) { const el = document.getElementById(id); if (el) el.textContent = val; } };
    set('pg-brand', data.brand);
    set('pg-footer-brand', data.brand);
    set('pg-presents', data.presents);
    set('pg-tag', data.tag);
    set('pg-eyebrow', data.eyebrow);
    set('pg-h1', data.h1);
    set('pg-subtitle', data.subtitle);
  } catch(e) { /* keep defaults */ }
}

async function load() {
  await loadSettings();

  const { data: sestavy } = await sb
    .from('sestavy')
    .select('*, produkty_sestavy(*)')
    .eq('aktivni', true)
    .order('created_at');

  const el = document.getElementById('sestavy');

  if (!sestavy || !sestavy.length) {
    el.innerHTML = `<div class="empty"><h2>Momentálně žádné akční sestavy</h2><p>Brzy přidáme nové nabídky.</p></div>`;
    return;
  }

  el.innerHTML = sestavy.map(s => {
    const prods   = (s.produkty_sestavy || []).sort((a,b) => new Date(b.created_at) - new Date(a.created_at));
    const celBez  = prods.reduce((a,p) => a + Number(p.cena_bez_dph), 0);
    const celS    = prods.reduce((a,p) => a + Number(p.cena_s_dph),   0);
    const akcni   = Number(s.akcni_cena) || 0;
    const akcniS  = Math.round(akcni * 1.21);
    const slevaBez = celBez - akcni;
    const pct = celBez > 0 ? Math.round(slevaBez / celBez * 100) : 0;

    const setHeader = `
      <header class="set-header">
        <h2 class="set-name">${esc(s.nazev)}</h2>
        <div class="set-header-right">
          <div class="save-block">
            <div class="save-label">Na této sestavě ušetříte celkem</div>
            <div class="save-value">${fmtKc(slevaBez)}</div>
          </div>
          <div class="save-pct">−${pct} %</div>
        </div>
      </header>`;

    const summary = `
      <footer class="summary">
        <div class="sum-col">
          <div class="sum-label">Ceníková cena</div>
          <div class="sum-sublabel">Cena bez DPH 21 %</div>
          <div class="sum-value list">${fmtKc(celBez)}</div>
          <div class="sum-vat">${fmtKcDph(celS)}</div>
        </div>
        <div class="sum-col right">
          <div class="sum-label">Akční cena sestavy</div>
          <div class="sum-sublabel">Cena bez DPH 21 %</div>
          <div class="sum-value sale">${fmtKc(akcni)}</div>
          <div class="sum-vat">${fmtKcDph(akcniS)}</div>
        </div>
      </footer>`;

    let mainHTML;
    if (s.jedan_artikl && prods.length > 0) {
      const p = prods[0];
      const bannerImg = s.sleva_obrazek_url
        ? `<img src="${esc(s.sleva_obrazek_url)}" alt="Akční nabídka">`
        : '';
      mainHTML = `
        <div class="promo-layout">
          <div class="promo-left" onclick="openDetail('${esc(p.artiklove_cislo)}','${esc(p.foto_url)}','${esc(p.nazev)}')">
            <img src="${esc(p.foto_url)}" alt="${esc(p.nazev)}" onerror="this.parentElement.style.opacity='.2'">
          </div>
          <div class="promo-right">
            <div class="promo-banner">${bannerImg}</div>
            <div class="promo-info">
              <div class="card-meta">
                <span class="sku">${esc(p.artiklove_cislo)}</span>
                <button class="detail-link" style="background:none;border:none;cursor:pointer;font-family:inherit" onclick="openDetail('${esc(p.artiklove_cislo)}','${esc(p.foto_url)}','${esc(p.nazev)}')">Detail ↗</button>
              </div>
              <div class="card-body">
                <h3 class="prod-name">${esc(p.nazev)}</h3>
                <div class="price-row">
                  <div class="price-main">${fmtKc(p.cena_bez_dph)}</div>
                  <div class="price-vat">${fmtKcDph(p.cena_s_dph)}</div>
                </div>
              </div>
            </div>
          </div>
        </div>`;
    } else {
      const priceCard = `
        <div class="price-card">
          <div class="price-card-top">
            <div class="sum-label">Ceníková cena / Cena před slevou</div>
            <div class="sum-sublabel">Cena bez DPH 21 %</div>
            <div class="sum-value list">${fmtKc(celBez)}</div>
            <div class="sum-vat">${fmtKcDph(celS)}</div>
          </div>
          <div class="price-card-bot">
            <div class="pc-prices">
              <div class="sum-vat">${fmtKcDph(akcniS)}</div>
              <div class="sum-label" style="margin-top:6px">Akční cena sestavy</div>
              <div class="sum-sublabel" style="margin-bottom:4px">Cena bez DPH 21 %</div>
              <div class="sum-value sale">${fmtKc(akcni)}</div>
            </div>
          </div>
        </div>`;
      mainHTML = `<div class="grid">${prods.slice(0,3).map(p => `
        <div class="card">
          <div class="card-img" onclick="openDetail('${esc(p.artiklove_cislo)}','${esc(p.foto_url)}','${esc(p.nazev)}')">
            <img src="${esc(p.foto_url)}" alt="${esc(p.nazev)}" onerror="this.parentElement.style.opacity='.2'">
          </div>
          <div class="card-meta">
            <span class="sku">${esc(p.artiklove_cislo)}</span>
            <button class="detail-link" style="background:none;border:none;cursor:pointer;font-family:inherit" onclick="openDetail('${esc(p.artiklove_cislo)}','${esc(p.foto_url)}','${esc(p.nazev)}')">Detail ↗</button>
          </div>
          <div class="card-body">
            <h3 class="prod-name">${esc(p.nazev)}</h3>
            <div class="price-row">
              <div class="price-main">${fmtKc(p.cena_bez_dph)}</div>
              <div class="price-vat">${fmtKcDph(p.cena_s_dph)}</div>
            </div>
          </div>
        </div>`).join('')}${priceCard}</div>`;
    }

    const hasSummary = s.jedan_artikl && prods.length > 0;
    return `<article class="set">${setHeader}${mainHTML}${hasSummary ? summary : ''}</article>`;
  }).join('');
}

load();
</script>
</body>
</html>
