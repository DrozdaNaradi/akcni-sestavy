<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Akční Sestavy – Drozda Nářadí</title>
<meta name="description" content="Výhodné sady nářadí Milwaukee za akční ceny. Drozda Nářadí."/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root{
  --bg:#0b0b0d;--surface:#161618;--surface-2:#1d1d20;
  --line:rgba(255,255,255,.08);--line-s:rgba(255,255,255,.14);
  --text:#f5f5f7;--text-2:#a1a1a6;--text-3:#6e6e73;
  --red:#e4002b;--green:#30d158;--radius:18px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh}

/* TOPBAR */
.topbar{border-bottom:1px solid var(--line);background:rgba(11,11,13,.85);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);position:sticky;top:0;z-index:50}
.topbar-inner{max-width:980px;margin:0 auto;padding:16px 24px;display:flex;align-items:center;justify-content:space-between}
.brand{font-size:14px;font-weight:700;letter-spacing:-.01em;color:var(--text)}
.brand span{color:var(--text-3);font-weight:500;margin-left:8px}
.topbar-tag{font-size:13px;color:var(--text-2);font-weight:500}

/* CONTAINER */
.container{max-width:980px;margin:0 auto;padding:56px 24px 80px}

/* HERO */
.hero{margin-bottom:52px}
.hero-date{font-size:13px;font-weight:600;color:var(--red);letter-spacing:.02em;margin-bottom:14px}
.hero h1{font-size:clamp(32px,5vw,52px);font-weight:700;letter-spacing:-.035em;line-height:1.05;margin-bottom:12px}
.hero p{font-size:17px;color:var(--text-2);max-width:520px}

/* SESTAVA */
.sestava{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);margin-bottom:20px;overflow:hidden}
.sestava-header{padding:24px 28px 0}
.sestava-nazev{font-size:20px;font-weight:700;letter-spacing:-.025em;margin-bottom:20px}

/* PRODUCT GRID */
.prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;padding:0 28px}
.prod-card{background:var(--surface-2);border:1px solid var(--line);border-radius:12px;padding:14px;display:flex;flex-direction:column;gap:10px;transition:border-color .15s}
.prod-card:hover{border-color:var(--line-s)}
.prod-img-wrap{aspect-ratio:1;border-radius:8px;background:var(--surface);overflow:hidden;display:flex;align-items:center;justify-content:center}
.prod-img-wrap img{width:100%;height:100%;object-fit:contain;padding:6px}
.prod-name{font-size:12px;font-weight:600;color:var(--text);line-height:1.4;flex:1}
.prod-ceny{display:flex;flex-direction:column;gap:2px}
.prod-cena-bez{font-size:15px;font-weight:700;color:var(--text)}
.prod-cena-s{font-size:11px;color:var(--text-3)}
.prod-link{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;color:var(--red);text-decoration:none;margin-top:2px}
.prod-link:hover{text-decoration:underline}
.prod-link svg{flex-shrink:0}

/* PRICE SUMMARY */
.price-summary{border-top:1px solid var(--line);margin-top:20px;padding:20px 28px 24px;display:flex;align-items:center;gap:32px;flex-wrap:wrap}
.ps-group{display:flex;flex-direction:column;gap:3px}
.ps-label{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text-3)}
.ps-val-bez{font-size:22px;font-weight:700;letter-spacing:-.025em;line-height:1}
.ps-val-s{font-size:12px;color:var(--text-3);margin-top:2px}
.ps-strike .ps-val-bez{color:var(--text-3);text-decoration:line-through;font-size:18px}
.ps-akcni .ps-val-bez{color:var(--red)}
.ps-sleva .ps-val-bez{color:var(--green)}
.ps-badge{display:inline-flex;align-items:center;background:rgba(48,209,88,.15);color:var(--green);font-size:12px;font-weight:700;padding:3px 9px;border-radius:20px;margin-top:4px}

.ps-divider{width:1px;height:48px;background:var(--line);flex-shrink:0}

/* EMPTY / LOADING */
.empty{text-align:center;padding:80px 20px;color:var(--text-3)}
.empty h2{font-size:20px;font-weight:600;color:var(--text-2);margin-bottom:8px}
.loading{text-align:center;padding:80px 20px;color:var(--text-3);font-size:15px}

/* RESPONSIVE */
@media(max-width:700px){
  .container{padding:36px 16px 60px}
  .sestava-header{padding:20px 20px 0}
  .prod-grid{padding:0 20px;grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}
  .price-summary{padding:16px 20px 20px;gap:20px}
  .ps-divider{display:none}
  .ps-val-bez{font-size:18px}
}
@media(max-width:480px){
  .topbar-inner{padding:14px 16px}
  .prod-grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <div class="brand">Drozda Nářadí <span>Presents</span></div>
    <div class="topbar-tag">Akční sestavy</div>
  </div>
</header>

<main class="container">
  <section class="hero">
    <div class="hero-date">Milwaukee Tool</div>
    <h1>Akční sestavy</h1>
    <p>Výhodné sady nářadí za speciální ceny. Platí jen po omezenou dobu.</p>
  </section>
  <div id="sestavy"><div class="loading">Načítání…</div></div>
</main>

<script>
const SB_URL = 'https://dsskekmjtdfasppwwmtd.supabase.co';
const SB_KEY = 'sb_publishable_FbEQYOP1kP0gS9dtWQJlZQ_ArFX9IpA';
const sb = supabase.createClient(SB_URL, SB_KEY);

function fmt(n){ return Number(n||0).toLocaleString('cs-CZ',{maximumFractionDigits:0}); }

async function load() {
  const { data: sestavy } = await sb
    .from('sestavy')
    .select('*, produkty_sestavy(*)')
    .eq('aktivni', true)
    .order('created_at');

  const el = document.getElementById('sestavy');

  if (!sestavy || !sestavy.length) {
    el.innerHTML = `<div class="empty"><h2>Momentálně žádné akční sestavy</h2><p>Brzy přidáme nové nabídky.</p></div>`;
    return;
  }

  el.innerHTML = sestavy.map(s => {
    const prods  = (s.produkty_sestavy || []).sort((a,b) => a.poradi - b.poradi);
    const celBez = prods.reduce((a,p) => a + Number(p.cena_bez_dph), 0);
    const celS   = prods.reduce((a,p) => a + Number(p.cena_s_dph),   0);
    const akcni  = Number(s.akcni_cena) || 0;
    const akcniS = Math.round(akcni * 1.21);
    const slevaBez = celBez - akcni;
    const slevaS   = celS - akcniS;
    const pct = celBez > 0 ? Math.round(slevaBez / celBez * 100) : 0;

    const prodsHTML = prods.map(p => `
      <div class="prod-card">
        <div class="prod-img-wrap">
          <img src="${p.foto_url}" alt="${p.nazev}" onerror="this.parentElement.style.opacity='.3'">
        </div>
        <div class="prod-name">${p.nazev}</div>
        <div class="prod-ceny">
          <div class="prod-cena-bez">${fmt(p.cena_bez_dph)} Kč</div>
          <div class="prod-cena-s">${fmt(p.cena_s_dph)} Kč s DPH</div>
        </div>
        ${p.odkaz_eshop ? `
          <a class="prod-link" href="${p.odkaz_eshop}" target="_blank" rel="noopener">
            Detail produktu
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          </a>` : ''}
      </div>`).join('');

    return `
    <div class="sestava">
      <div class="sestava-header">
        <div class="sestava-nazev">${s.nazev}</div>
      </div>
      <div class="prod-grid">${prodsHTML}</div>
      <div class="price-summary">
        <div class="ps-group ps-strike">
          <div class="ps-label">Ceníková cena</div>
          <div class="ps-val-bez">${fmt(celBez)} Kč</div>
          <div class="ps-val-s">${fmt(celS)} Kč s DPH</div>
        </div>
        <div class="ps-divider"></div>
        <div class="ps-group ps-akcni">
          <div class="ps-label">Akční cena</div>
          <div class="ps-val-bez">${fmt(akcni)} Kč</div>
          <div class="ps-val-s">${fmt(akcniS)} Kč s DPH</div>
        </div>
        <div class="ps-divider"></div>
        <div class="ps-group ps-sleva">
          <div class="ps-label">Ušetříte</div>
          <div class="ps-val-bez">${fmt(slevaBez)} Kč</div>
          <div class="ps-val-s">${fmt(slevaS)} Kč s DPH</div>
          <div class="ps-badge">−${pct} %</div>
        </div>
      </div>
    </div>`;
  }).join('');
}

load();
</script>
</body>
</html>
