<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin – Akční Sestavy | Drozda Nářadí</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
:root{
  --bg:#0b0b0d;--surface:#161618;--surface-2:#1d1d20;--surface-3:#242428;
  --line:rgba(255,255,255,.08);--line-s:rgba(255,255,255,.14);
  --text:#f5f5f7;--text-2:#a1a1a6;--text-3:#6e6e73;
  --red:#e4002b;--green:#30d158;--radius:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh}

/* LOGIN */
#login{min-height:100vh;display:flex;align-items:center;justify-content:center}
.login-card{background:var(--surface);border:1px solid var(--line);border-radius:20px;padding:40px;width:100%;max-width:340px;text-align:center}
.login-logo{font-size:12px;font-weight:700;color:var(--text-3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px}
.login-title{font-size:22px;font-weight:700;letter-spacing:-.02em;margin-bottom:28px}
.login-input{width:100%;background:var(--surface-2);border:1px solid var(--line);border-radius:10px;padding:12px 16px;color:var(--text);font-size:15px;font-family:inherit;margin-bottom:10px;outline:none;text-align:center}
.login-input:focus{border-color:var(--line-s)}
.login-err{color:var(--red);font-size:13px;margin-bottom:10px;display:none}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:9px;border:none;cursor:pointer;font-size:14px;font-weight:600;font-family:inherit;transition:opacity .15s;text-decoration:none;white-space:nowrap}
.btn:hover{opacity:.82}.btn:active{opacity:.65}
.btn-primary{background:var(--red);color:#fff}
.btn-secondary{background:var(--surface-2);color:var(--text);border:1px solid var(--line)}
.btn-ghost{background:transparent;color:var(--text-3);padding:6px 10px;font-size:13px}
.btn-danger{background:rgba(228,0,43,.15);color:var(--red)}
.btn-sm{padding:6px 12px;font-size:13px}
.btn-full{width:100%;justify-content:center}

/* TOPBAR */
.topbar{border-bottom:1px solid var(--line);background:rgba(11,11,13,.88);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);position:sticky;top:0;z-index:50}
.topbar-inner{max-width:860px;margin:0 auto;padding:14px 20px;display:flex;align-items:center;justify-content:space-between}
.brand{font-size:14px;font-weight:700}.brand span{color:var(--text-3);font-weight:400;margin-left:6px}

/* LAYOUT */
.container{max-width:860px;margin:0 auto;padding:36px 20px 80px}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.page-title{font-size:22px;font-weight:700;letter-spacing:-.03em}

/* SESTAVA CARD */
.s-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);margin-bottom:10px;overflow:hidden}
.s-header{display:flex;align-items:center;gap:10px;padding:14px 16px;cursor:pointer;user-select:none}
.s-header:hover{background:rgba(255,255,255,.02)}
.s-name{flex:1;font-size:15px;font-weight:600;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.s-meta{font-size:12px;color:var(--text-3);white-space:nowrap}
.s-chevron{color:var(--text-3);transition:transform .2s;flex-shrink:0}
.s-chevron.open{transform:rotate(90deg)}

/* TOGGLE */
.toggle{position:relative;width:36px;height:22px;flex-shrink:0;cursor:pointer}
.toggle input{opacity:0;width:0;height:0;position:absolute}
.t-track{position:absolute;inset:0;background:var(--surface-3);border:1px solid var(--line);border-radius:11px;transition:background .2s}
.toggle input:checked~.t-track{background:var(--green);border-color:var(--green)}
.t-thumb{position:absolute;top:3px;left:3px;width:14px;height:14px;background:#fff;border-radius:50%;transition:transform .2s}
.toggle input:checked~.t-track .t-thumb{transform:translateX(14px)}

/* BODY */
.s-body{border-top:1px solid var(--line);padding:20px;display:flex;flex-direction:column;gap:20px}
.sec-label{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-3);margin-bottom:8px}

/* INPUTS */
.inp{background:var(--surface-2);border:1px solid var(--line);border-radius:8px;padding:9px 13px;color:var(--text);font-size:14px;font-family:inherit;outline:none;width:100%}
.inp:focus{border-color:var(--line-s)}
.row{display:flex;gap:10px;align-items:center}
.row .inp{flex:1}

/* PRODUCTS */
.prod-list{display:flex;flex-direction:column;gap:8px}
.prod-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--surface-2);border:1px solid var(--line);border-radius:10px}
.prod-img{width:52px;height:52px;object-fit:contain;border-radius:6px;background:var(--surface-3);flex-shrink:0}
.prod-info{flex:1;min-width:0}
.prod-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prod-sub{font-size:12px;color:var(--text-3);margin-top:2px}
.prod-ceny{text-align:right;flex-shrink:0}
.prod-cena-bez{font-size:14px;font-weight:700;color:var(--text)}
.prod-cena-s{font-size:11px;color:var(--text-3);margin-top:2px}

/* SEARCH PREVIEW */
.preview-box{margin-top:8px;background:var(--surface-2);border:1px solid var(--line-s);border-radius:10px;padding:14px;display:flex;gap:14px}
.preview-box img{width:64px;height:64px;object-fit:contain;border-radius:8px;background:var(--surface-3);flex-shrink:0}
.preview-info{flex:1;min-width:0}
.preview-name{font-size:14px;font-weight:600;margin-bottom:4px}
.preview-ceny{font-size:13px;color:var(--text-3);margin-bottom:10px}
.preview-ceny b{color:var(--text);font-weight:600}
.preview-inputs{display:flex;gap:10px;flex-wrap:wrap}
.preview-field{display:flex;flex-direction:column;gap:4px}
.preview-field label{font-size:11px;color:var(--text-3);font-weight:500}
.preview-field .inp{width:140px}
.not-found{font-size:13px;color:var(--red);margin-top:6px;padding:8px 0}

/* PRICE SUMMARY */
.price-inputs{display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.price-field{display:flex;flex-direction:column;gap:4px;flex:1;min-width:140px}
.price-field label{font-size:11px;color:var(--text-3);font-weight:500;letter-spacing:.02em}
.price-box{background:var(--surface-2);border:1px solid var(--line);border-radius:10px;padding:16px}
.price-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;font-size:14px}
.price-row+.price-row{border-top:1px solid var(--line)}
.pl{color:var(--text-3)}.pv{font-weight:600}
.pv-main{font-weight:700;font-size:16px;color:var(--text)}
.pv-sub{font-size:12px;color:var(--text-3);font-weight:400}
.pv-strike{text-decoration:line-through;color:var(--text-3)}
.pv-akcni{color:var(--red)}
.pv-sleva{color:var(--green)}

/* EMPTY / LOADING */
.empty{text-align:center;padding:56px 20px;color:var(--text-3)}
.empty h3{font-size:17px;font-weight:600;color:var(--text-2);margin-bottom:6px}
.loading{text-align:center;padding:40px;color:var(--text-3);font-size:14px}

@media(max-width:600px){
  .preview-inputs,.price-inputs{flex-direction:column}
  .preview-field .inp,.price-field .inp{width:100%}
}

/* ICON PICKER */
.icon-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
.icon-opt{width:64px;cursor:pointer;border-radius:10px;border:2px solid transparent;padding:6px;background:var(--surface-2);display:flex;flex-direction:column;align-items:center;gap:4px;transition:border-color .15s}
.icon-opt:hover{border-color:var(--line-s)}
.icon-opt.selected{border-color:var(--red)}
.icon-opt img{width:40px;height:40px;object-fit:contain}
.icon-opt span{font-size:9px;color:var(--text-3);text-align:center;line-height:1.2;word-break:break-all}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login" style="display:none">
  <div class="login-card">
    <div class="login-logo">Drozda Nářadí</div>
    <div class="login-title">Admin přístup</div>
    <div class="login-err" id="login-err">Nesprávné heslo</div>
    <input class="login-input" type="password" id="pwd" placeholder="Heslo"
           onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn btn-primary btn-full" style="margin-top:4px" onclick="doLogin()">Přihlásit se</button>
  </div>
</div>

<div id="app" style="display:none">
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">Drozda Nářadí <span>admin</span></div>
      <button class="btn btn-ghost" onclick="logout()">Odhlásit</button>
    </div>
  </header>
  <main class="container">

    <!-- NASTAVENÍ STRÁNKY -->
    <div class="s-card" style="margin-bottom:20px">
      <div class="s-header" onclick="toggleSettings()">
        <div class="s-name">Nastavení textů stránky</div>
        <svg class="s-chevron" id="settings-chev" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
      </div>
      <div class="s-body" id="settings-body" style="display:none">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          <div>
            <div class="sec-label">Brand (levý topbar)</div>
            <input class="inp" id="set-brand" placeholder="Drozda Nářadí">
          </div>
          <div>
            <div class="sec-label">Presents (vedle brand)</div>
            <input class="inp" id="set-presents" placeholder="Presents">
          </div>
          <div>
            <div class="sec-label">Tag (pravý topbar)</div>
            <input class="inp" id="set-tag" placeholder="Akční sestavy">
          </div>
          <div>
            <div class="sec-label">Eyebrow (nad nadpisem)</div>
            <input class="inp" id="set-eyebrow" placeholder="Milwaukee Tool">
          </div>
          <div>
            <div class="sec-label">Nadpis H1</div>
            <input class="inp" id="set-h1" placeholder="Akční sestavy">
          </div>
          <div>
            <div class="sec-label">Podnadpis</div>
            <input class="inp" id="set-subtitle" placeholder="Výhodné sady nářadí...">
          </div>
        </div>
        <div style="margin-top:4px">
          <button class="btn btn-primary" onclick="saveSettings()">Uložit nastavení</button>
          <span id="settings-msg" style="font-size:13px;color:var(--green);margin-left:12px;display:none">Uloženo ✓</span>
        </div>
      </div>
    </div>

    <div class="page-header">
      <h1 class="page-title">Akční sestavy</h1>
      <button class="btn btn-primary" onclick="novaSestava()">+ Nová sestava</button>
    </div>
    <div id="list"><div class="loading">Načítání…</div></div>
  </main>
</div>

<script>
const SB_URL = 'https://dsskekmjtdfasppwwmtd.supabase.co';
const SB_KEY = 'sb_publishable_FbEQYOP1kP0gS9dtWQJlZQ_ArFX9IpA';
const PWD    = 'hdzTVtztz67-JSGg';

let sb = null;
let db = {};
let openId = null;
let allSestavy = [];

// ── AUTH ─────────────────────────────────────
function doLogin() {
  const val = document.getElementById('pwd').value;
  if (val === PWD) {
    sessionStorage.setItem('auth','1');
    document.getElementById('login').style.display = 'none';
    document.getElementById('app').style.display   = 'block';
    init();
  } else {
    document.getElementById('login-err').style.display = 'block';
    document.getElementById('pwd').value = '';
    document.getElementById('pwd').focus();
  }
}
function logout(){ sessionStorage.removeItem('auth'); location.reload(); }

// ── ICONS ────────────────────────────────────
const ICONS = [
  { id:'automechanik',  label:'Automechanik' },
  { id:'elektrikar',    label:'Elektrikář' },
  { id:'instaleter',    label:'Instalatér' },
  { id:'ostatni',       label:'Ostatní' },
  { id:'stavba',        label:'Stavba' },
  { id:'stavebnictvi',  label:'Stavebnictví' },
  { id:'tesar-truhlar', label:'Tesař/Truhlář' },
  { id:'zahrada',       label:'Zahrada' },
];

function iconPickerHTML(sid, current) {
  return ICONS.map(ic => `
    <div class="icon-opt${ic.id === current ? ' selected' : ''}"
         id="ico-${sid}-${ic.id}"
         onclick="pickIcon('${sid}','${ic.id}')">
      <img src="icons/${ic.id}.png" alt="${ic.label}">
      <span>${ic.label}</span>
    </div>`).join('');
}

async function pickIcon(sid, iconId) {
  await saveField(sid, 'ikona', iconId);
  document.querySelectorAll(`[id^="ico-${sid}-"]`).forEach(el => el.classList.remove('selected'));
  document.getElementById(`ico-${sid}-${iconId}`).classList.add('selected');
}

// ── INIT ─────────────────────────────────────
async function init() {
  try { sb = supabase.createClient(SB_URL, SB_KEY); }
  catch(e) { alert('Chyba připojení k databázi: ' + e.message); return; }
  db = await fetch('produkty.json').then(r => r.json());
  await loadSettingsAdmin();
  await refresh();
}

// ── PAGE SETTINGS ─────────────────────────────
function toggleSettings() {
  const body = document.getElementById('settings-body');
  const chev = document.getElementById('settings-chev');
  const isOpen = body.style.display !== 'none';
  body.style.display = isOpen ? 'none' : 'flex';
  chev.classList.toggle('open', !isOpen);
}

async function loadSettingsAdmin() {
  try {
    const { data } = await sb.from('page_settings').select('*').eq('id', 1).maybeSingle();
    if (!data) return;
    const fields = ['brand','presents','tag','eyebrow','h1','subtitle'];
    fields.forEach(f => {
      const el = document.getElementById('set-' + f);
      if (el && data[f]) el.value = data[f];
    });
  } catch(e) { /* ignore */ }
}

async function saveSettings() {
  const vals = {
    id: 1,
    brand:    document.getElementById('set-brand').value.trim(),
    presents: document.getElementById('set-presents').value.trim(),
    tag:      document.getElementById('set-tag').value.trim(),
    eyebrow:  document.getElementById('set-eyebrow').value.trim(),
    h1:       document.getElementById('set-h1').value.trim(),
    subtitle: document.getElementById('set-subtitle').value.trim(),
  };
  const { error } = await sb.from('page_settings').upsert(vals);
  const msg = document.getElementById('settings-msg');
  if (error) {
    msg.textContent = '⚠ Chyba: ' + error.message;
    msg.style.color = 'var(--red)';
  } else {
    msg.textContent = 'Uloženo ✓';
    msg.style.color = 'var(--green)';
  }
  msg.style.display = 'inline';
  setTimeout(() => { msg.style.display = 'none'; msg.textContent = 'Uloženo ✓'; msg.style.color = 'var(--green)'; }, 4000);
}

// ── DATA ─────────────────────────────────────
async function getAll() {
  const { data } = await sb.from('sestavy')
    .select('*, produkty_sestavy(*)')
    .order('created_at');
  return data || [];
}
async function refresh() { allSestavy = await getAll(); render(allSestavy); }

async function novaSestava() {
  const { data } = await sb.from('sestavy')
    .insert({ nazev: 'Nová sestava', aktivni: true, akcni_cena: 0 })
    .select().single();
  if (data) { openId = data.id; await refresh(); }
}

async function delSestava(id) {
  if (!confirm('Smazat sestavu i se všemi produkty?')) return;
  await sb.from('sestavy').delete().eq('id', id);
  if (openId === id) openId = null;
  await refresh();
}

async function saveField(id, field, val) {
  await sb.from('sestavy').update({ [field]: val }).eq('id', id);
}

async function addProdukt(sid, artikl, bezDph, sDph) {
  const p = db[artikl];
  if (!p) return false;
  await sb.from('produkty_sestavy').insert({
    sestava_id: sid,
    artiklove_cislo: artikl,
    nazev: p.n,
    foto_url: p.f,
    cena_bez_dph: bezDph ?? p.b ?? 0,
    cena_s_dph:   sDph   ?? p.s ?? 0,
    odkaz_eshop: p.u || '',
    poradi: Date.now()
  });
  return true;
}

async function delProdukt(id) {
  await sb.from('produkty_sestavy').delete().eq('id', id);
  await refresh();
}

// ── HELPERS ──────────────────────────────────
function fmtBez(n){ return fmt(n) + ' Kč bez DPH'; }
function fmtS(n)  { return fmt(n) + ' Kč s DPH'; }
function fmt(n)   { return Number(n||0).toLocaleString('cs-CZ',{maximumFractionDigits:0}); }

function calc(s) {
  const prods  = s.produkty_sestavy || [];
  const celBez = prods.reduce((a,p) => a + Number(p.cena_bez_dph), 0);
  const celS   = prods.reduce((a,p) => a + Number(p.cena_s_dph),   0);
  const akcni  = Number(s.akcni_cena) || 0;
  const akcniS = Math.round(akcni * 1.21);
  const slevaBez = celBez - akcni;
  const slevaS   = celS   - akcniS;
  const pct = celBez > 0 ? Math.round(slevaBez / celBez * 100) : 0;
  return { celBez, celS, akcni, akcniS, slevaBez, slevaS, pct };
}

// ── RENDER ───────────────────────────────────
function render(sestavy) {
  const el = document.getElementById('list');
  if (!sestavy.length) {
    el.innerHTML = `<div class="empty"><h3>Žádné sestavy</h3><p>Začni kliknutím na „+ Nová sestava"</p></div>`;
    return;
  }
  el.innerHTML = '';
  sestavy.forEach(s => {
    const div = document.createElement('div');
    div.className = 's-card'; div.id = 'c-' + s.id;
    div.innerHTML = cardHTML(s);
    el.appendChild(div);
    if (s.id === openId) {
      div.querySelector('.s-body').style.display = 'flex';
      div.querySelector('.s-chevron').classList.add('open');
    }
  });
}

function cardHTML(s) {
  const { celBez, celS, akcni, akcniS, slevaBez, slevaS, pct } = calc(s);
  const prods = s.produkty_sestavy || [];

  const prodsHTML = prods.length
    ? prods.map(p => `
      <div class="prod-item">
        <img class="prod-img" src="${p.foto_url}" onerror="this.style.opacity='.2'" alt="">
        <div class="prod-info">
          <div class="prod-name">${p.nazev}</div>
          <div class="prod-sub">Artikl: ${p.artiklove_cislo}</div>
        </div>
        <div class="prod-ceny">
          <div class="prod-cena-bez">${fmt(p.cena_bez_dph)} Kč</div>
          <div class="prod-cena-s">${fmt(p.cena_s_dph)} Kč s DPH</div>
        </div>
        <button class="btn btn-ghost btn-sm" onclick="ev(event);delProd('${p.id}')" title="Odebrat">✕</button>
      </div>`).join('')
    : `<div style="color:var(--text-3);font-size:13px;padding:4px 0">Zatím žádné produkty.</div>`;

  return `
  <div class="s-header" onclick="toggleCard('${s.id}')">
    <label class="toggle" onclick="ev(event)">
      <input type="checkbox" ${s.aktivni?'checked':''} onchange="saveField('${s.id}','aktivni',this.checked)">
      <div class="t-track"><div class="t-thumb"></div></div>
    </label>
    <div class="s-name">${s.nazev}</div>
    <div class="s-meta">${prods.length} pol. · ${fmt(celBez)} Kč</div>
    <button class="btn btn-danger btn-sm" onclick="ev(event);delS('${s.id}')" title="Smazat sestavu" style="padding:5px 9px;flex-shrink:0">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
    </button>
    <svg class="s-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
  </div>

  <div class="s-body" style="display:none">

    <!-- Ikona -->
    <div>
      <div class="sec-label">Ikona sestavy</div>
      <div class="icon-grid">${iconPickerHTML(s.id, s.ikona || '')}</div>
    </div>

    <!-- Název -->
    <div>
      <div class="sec-label">Název sestavy</div>
      <div class="row">
        <input class="inp" id="n-${s.id}" value="${s.nazev.replace(/"/g,'&quot;')}"
               onkeydown="if(event.key==='Enter')saveNazev('${s.id}')">
        <button class="btn btn-secondary btn-sm" onclick="saveNazev('${s.id}')">Uložit</button>
      </div>
    </div>

    <!-- Produkty -->
    <div>
      <div class="sec-label">Produkty v sestavě</div>
      <div class="prod-list">${prodsHTML}</div>
    </div>

    <!-- Přidat produkt -->
    <div>
      <div class="sec-label">Přidat produkt</div>
      <div class="row">
        <input class="inp" id="a-${s.id}" placeholder="Artikl číslo Milwaukee (např. 4933464979)"
               style="font-family:ui-monospace,monospace"
               oninput="preview('${s.id}')"
               onkeydown="if(event.key==='Enter')doAdd('${s.id}')">
        <button class="btn btn-primary btn-sm" onclick="doAdd('${s.id}')">Přidat</button>
      </div>
      <div id="pv-${s.id}"></div>
    </div>

    <!-- Ceny -->
    <div>
      <div class="sec-label">Akční cena sestavy</div>
      <div class="price-inputs">
        <div class="price-field">
          <label>Akční cena BEZ DPH (Kč) — hlavní</label>
          <input class="inp" type="number" id="ac-${s.id}" value="${akcni}" min="0" step="1"
                 onblur="saveAkcni('${s.id}')" onkeydown="if(event.key==='Enter')this.blur()">
        </div>
        <div class="price-field" style="justify-content:flex-end">
          <label>S DPH (21 %) — vypočteno</label>
          <input class="inp" id="ac-s-${s.id}" value="${akcniS}" readonly
                 style="color:var(--text-3);cursor:default">
        </div>
      </div>
      <div class="price-box">
        <div class="price-row">
          <span class="pl">Ceníková cena celkem</span>
          <span>
            <span class="pv pv-main pv-strike">${fmt(celBez)} Kč</span>
            <span class="pv-sub"> / ${fmt(celS)} s DPH</span>
          </span>
        </div>
        <div class="price-row">
          <span class="pl">Akční cena</span>
          <span>
            <span class="pv pv-main pv-akcni">${fmt(akcni)} Kč</span>
            <span class="pv-sub"> / ${fmt(akcniS)} s DPH</span>
          </span>
        </div>
        <div class="price-row">
          <span class="pl">Sleva</span>
          <span>
            <span class="pv pv-sleva">${fmt(slevaBez)} Kč (${pct} %)</span>
            <span class="pv-sub"> / ${fmt(slevaS)} s DPH</span>
          </span>
        </div>
      </div>
    </div>

    <!-- Export -->
    <div style="padding-top:4px;border-top:1px solid var(--line);display:flex;justify-content:flex-end">
      <button class="btn btn-secondary btn-sm" id="exp-btn-${s.id}" onclick="exportSet('${s.id}')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Exportovat PNG (A4)
      </button>
    </div>

  </div>`;
}

// ── INTERACTIONS ─────────────────────────────
function ev(e){ e.stopPropagation(); }

function toggleCard(id) {
  const body = document.querySelector('#c-'+id+' .s-body');
  const chev = document.querySelector('#c-'+id+' .s-chevron');
  const isOpen = body.style.display !== 'none';
  body.style.display = isOpen ? 'none' : 'flex';
  chev.classList.toggle('open', !isOpen);
  openId = isOpen ? null : id;
}

async function saveNazev(id) {
  const val = document.getElementById('n-'+id).value.trim();
  if (!val) return;
  await saveField(id, 'nazev', val);
  document.querySelector('#c-'+id+' .s-name').textContent = val;
}

async function saveAkcni(id) {
  const bez = parseFloat(document.getElementById('ac-'+id).value)||0;
  const sDph = Math.round(bez * 1.21);
  const sDphEl = document.getElementById('ac-s-'+id);
  if (sDphEl) sDphEl.value = sDph;
  await saveField(id, 'akcni_cena', bez);
  await refresh();
  reopenCard(id);
}

function preview(sid) {
  const artikl = document.getElementById('a-'+sid).value.trim();
  const el = document.getElementById('pv-'+sid);
  if (!artikl || artikl.length < 4) { el.innerHTML=''; return; }
  const p = db[artikl];
  if (!p) {
    el.innerHTML = `<div class="not-found">Artikl ${artikl} nebyl nalezen v ceníku Milwaukee.</div>`;
    return;
  }
  el.innerHTML = `
    <div class="preview-box">
      <img src="${p.f}" onerror="this.style.opacity='.2'" alt="">
      <div class="preview-info">
        <div class="preview-name">${p.n}</div>
        <div class="preview-ceny">
          Ceníková: <b>${fmt(p.b)} Kč bez DPH</b> · ${fmt(p.s)} Kč s DPH
        </div>
        <div class="preview-inputs">
          <div class="preview-field">
            <label>Cena BEZ DPH (Kč) — hlavní</label>
            <input class="inp" type="number" id="pb-${sid}" value="${p.b||0}" min="0" step="1">
          </div>
          <div class="preview-field">
            <label>Cena S DPH (Kč)</label>
            <input class="inp" type="number" id="ps-${sid}" value="${p.s||0}" min="0" step="1">
          </div>
        </div>
      </div>
    </div>`;
}

async function doAdd(sid) {
  const artikl = document.getElementById('a-'+sid).value.trim();
  if (!artikl) return;
  const bezEl = document.getElementById('pb-'+sid);
  const sDphEl = document.getElementById('ps-'+sid);
  const bez  = bezEl  ? parseFloat(bezEl.value)||0  : null;
  const sDph = sDphEl ? parseFloat(sDphEl.value)||0 : null;
  const ok = await addProdukt(sid, artikl, bez, sDph);
  if (!ok) { alert('Artikl '+artikl+' nebyl nalezen v databázi Milwaukee.'); return; }
  document.getElementById('a-'+sid).value = '';
  document.getElementById('pv-'+sid).innerHTML = '';
  await refresh();
  reopenCard(sid);
}

async function delProd(id) { await delProdukt(id); }
async function delS(id) { await delSestava(id); }

function reopenCard(id) {
  setTimeout(() => {
    const body = document.querySelector('#c-'+id+' .s-body');
    const chev = document.querySelector('#c-'+id+' .s-chevron');
    if (body) { body.style.display='flex'; chev && chev.classList.add('open'); }
  }, 50);
}

// ── EXPORT PNG ───────────────────────────────
async function imgToDataUrl(url) {
  // images.weserv.nl — image proxy s CORS (*), Milwaukee S3 nemá vlastní CORS
  const proxyUrl = 'https://images.weserv.nl/?url=' + encodeURIComponent(url.replace(/^https?:\/\//, '')) + '&q=100';
  try {
    const resp = await fetch(proxyUrl, { signal: AbortSignal.timeout(12000) });
    if (!resp.ok) throw new Error('status ' + resp.status);
    const blob = await resp.blob();
    return await new Promise(res => {
      const r = new FileReader();
      r.onloadend = () => res(r.result);
      r.readAsDataURL(blob);
    });
  } catch { return ''; }
}

async function exportSet(id) {
  const s = allSestavy.find(x => x.id === id);
  if (!s) return;

  if (typeof html2canvas === 'undefined') {
    alert('html2canvas se nepodařilo načíst. Zkontroluj připojení k internetu a znovu načti stránku.');
    return;
  }

  const btn = document.getElementById('exp-btn-' + id);
  const btnOrigHTML = btn ? btn.innerHTML : '';
  if (btn) { btn.disabled = true; btn.textContent = 'Načítám obrázky…'; }

  const prods  = (s.produkty_sestavy || []).sort((a,b) => a.poradi - b.poradi);
  const celBez = prods.reduce((a,p) => a + Number(p.cena_bez_dph), 0);
  const celS   = prods.reduce((a,p) => a + Number(p.cena_s_dph),   0);
  const akcni  = Number(s.akcni_cena) || 0;
  const akcniS = Math.round(akcni * 1.21);
  const slevaBez = celBez - akcni;
  const pct = celBez > 0 ? Math.round(slevaBez / celBez * 100) : 0;

  // Předem stáhnout všechny obrázky jako base64 (obejde CORS)
  const imgMap = {};
  await Promise.all(prods.map(async p => {
    if (p.foto_url) imgMap[p.foto_url] = await imgToDataUrl(p.foto_url);
  }));

  if (btn) btn.textContent = 'Renderuji…';

  function esc(v){ return String(v||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function fmtKc(n){ return Number(n||0).toLocaleString('cs-CZ',{maximumFractionDigits:0}) + ',- Kč'; }
  function fmtKcDph(n){ return Number(n||0).toLocaleString('cs-CZ',{maximumFractionDigits:0}) + ',- Kč s DPH'; }

  const prodsHTML = prods.map(p => {
    const src = imgMap[p.foto_url] || '';
    const imgStyle = src
      ? `background-image:url('${src}');background-size:contain;background-repeat:no-repeat;background-position:center;`
      : '';
    return `
    <div class="card">
      <div class="card-img" style="${imgStyle}"></div>
      <div class="card-meta">
        <span class="sku">${esc(p.artiklove_cislo)}</span>
        ${p.odkaz_eshop ? `<span class="detail-link">Detail ↗</span>` : ''}
      </div>
      <div class="card-body">
        <h3 class="prod-name">${esc(p.nazev)}</h3>
        <div class="price-row">
          <div class="price-main">${fmtKc(p.cena_bez_dph)}</div>
          <div class="price-vat">${fmtKcDph(p.cena_s_dph)}</div>
        </div>
      </div>
    </div>`;
  }).join('');

  const setHTML = `
    <article class="set">
      <header class="set-header">
        <h2 class="set-name">${esc(s.nazev)}</h2>
        <div class="set-header-right">
          <div class="save-block">
            <div class="save-label">Ušetříte</div>
            <div class="save-value">${fmtKc(slevaBez)}</div>
          </div>
          <div class="save-pct">−${pct}&nbsp;%</div>
        </div>
      </header>
      <div class="grid">${prodsHTML}</div>
      <footer class="summary">
        <div class="sum-col">
          <div class="sum-label">Ceníková cena</div>
          <div class="sum-sublabel">Cena bez DPH 21&nbsp;%</div>
          <div class="sum-value list">${fmtKc(celBez)}</div>
          <div class="sum-vat">${fmtKcDph(celS)}</div>
        </div>
        <div class="sum-col right">
          <div class="sum-label">Akční cena sestavy</div>
          <div class="sum-sublabel">Cena bez DPH 21&nbsp;%</div>
          <div class="sum-value sale">${fmtKc(akcni)}</div>
          <div class="sum-vat">${fmtKcDph(akcniS)}</div>
        </div>
      </footer>
    </article>`;

  // Světlý motiv — stejné barvy jako index.html light mode
  const css = `
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#f8f8f8;color:#111111;font-family:'Inter Tight','Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
    .set{background:#eeeeee;border:1px solid #c0c0c0;border-radius:16px;padding:22px;display:flex;flex-direction:column;gap:16px}
    .set-header{display:flex;justify-content:space-between;align-items:center;padding-bottom:16px;border-bottom:1px solid #c0c0c0;gap:20px;flex-wrap:wrap}
    .set-name{font-size:30px;font-weight:700;letter-spacing:-.03em;margin:0;line-height:1;color:#111111}
    .set-header-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
    .save-block{text-align:right}
    .save-label{color:#555555;font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-bottom:3px}
    .save-value{color:#111111;font-size:18px;font-weight:700;letter-spacing:-.02em;line-height:1;font-variant-numeric:tabular-nums}
    .save-pct{background:#DB011C;color:#fff;font-size:16px;font-weight:800;padding:8px 12px;border-radius:7px;letter-spacing:-.01em;line-height:1;font-variant-numeric:tabular-nums}
    .grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px}
    .card{background:#ffffff;border:1px solid #c8c8c8;border-radius:14px;overflow:hidden;display:flex;flex-direction:column}
    .card-img{background:#f4f4f4;aspect-ratio:1/1;margin:12px;border-radius:10px;overflow:hidden;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .card-img img{width:100%;height:100%;object-fit:contain;padding:6px}
    .card-meta{display:flex;justify-content:space-between;align-items:center;padding:7px 14px;border-bottom:1px solid #c8c8c8;gap:8px}
    .sku{color:#777777;font-size:11px;font-family:ui-monospace,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .detail-link{color:#DB011C;font-size:12px;font-weight:600;white-space:nowrap;flex-shrink:0}
    .card-body{padding:10px 14px 14px;display:flex;flex-direction:column;gap:8px;flex:1}
    .prod-name{font-size:14px;font-weight:500;line-height:1.35;color:#333333;margin:0;flex:1}
    .price-row{border-top:1px solid #c8c8c8;padding-top:10px;margin-top:auto}
    .price-main{font-size:20px;font-weight:700;color:#111111}
    .price-vat{font-size:12px;color:#777777;margin-top:2px}
    .summary{padding-top:18px;border-top:1px solid #c0c0c0;display:grid;grid-template-columns:1fr auto;gap:32px;align-items:start}
    .sum-col{display:flex;flex-direction:column;min-width:0}
    .sum-col.right{text-align:right;align-items:flex-end}
    .sum-label{color:#333333;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;line-height:1.2;margin-bottom:3px}
    .sum-sublabel{color:#999999;font-size:11px;font-weight:700;letter-spacing:.02em;line-height:1.2;margin-bottom:8px}
    .sum-value{font-size:40px;font-weight:700;letter-spacing:-.03em;line-height:1;font-variant-numeric:tabular-nums;margin:0;color:#111111}
    .sum-value.list{color:#999999;text-decoration:line-through;text-decoration-color:#DB011C;text-decoration-thickness:2px}
    .sum-value.sale{color:#1a1a1a;background:#FFD60A;display:inline-block;padding:4px 12px;border-radius:8px}
    .sum-vat{font-size:14px;color:#777777;font-weight:500;letter-spacing:.02em;margin-top:6px;line-height:1.2}
  `;

  const wrap = document.createElement('div');
  wrap.style.cssText = 'position:fixed;left:-9999px;top:0;width:1200px;padding:40px;background:#f8f8f8;z-index:-1;';

  const styleEl = document.createElement('style');
  styleEl.textContent = css;
  wrap.appendChild(styleEl);

  const content = document.createElement('div');
  content.innerHTML = setHTML;
  wrap.appendChild(content);
  document.body.appendChild(wrap);

  await document.fonts.ready;

  try {
    const canvas = await html2canvas(wrap, {
      useCORS: false,
      scale: 3,
      backgroundColor: '#f8f8f8',
      logging: false,
      imageTimeout: 0
    });
    const dataUrl = canvas.toDataURL('image/png');
    const a = document.createElement('a');
    a.href = dataUrl;
    a.download = s.nazev.replace(/[^a-zA-Z0-9\s-]/g, '').trim().replace(/\s+/g, '-') + '.png';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  } catch(err) {
    alert('Export se nezdařil: ' + err.message);
  } finally {
    document.body.removeChild(wrap);
    if (btn) {
      btn.disabled = false;
      btn.innerHTML = btnOrigHTML;
    }
  }
}

  document.getElementById('app').style.display = 'block';
  init();
} else {
  document.getElementById('login').style.display = 'flex';
}
